name: Build Wheels For DynamicFont Extension

on:
  push:
    branches: [ master, main ]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [ master, main ]
    paths-ignore:
      - 'README.md'
      - 'docs/**'

jobs:
  build_wheels:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels via cibuildwheel
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_BUILD: cp38-* cp39-* cp310-* cp311-* cp312-* cp313-* cp314-*
          CIBW_SKIP: pp*
          
          CIBW_ARCHS_WINDOWS: auto32 auto64          
          CIBW_ARCHS_LINUX: auto64
          CIBW_ARCHS_MACOS: x86_64 arm64

      - name: Upload Wheels to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dynamicfont-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl